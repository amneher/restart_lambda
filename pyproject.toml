[project]
name = "aws-lambda-fastapi"
version = "0.1.0"
description = "AWS Lambda with FastAPI, SQLite, and Pydantic"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.109.0",
    "mangum>=0.17.0",
    "pydantic>=2.5.0",
    "uvicorn>=0.27.0",
    "pytest>=7.4.0",
    "httpx>=0.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
