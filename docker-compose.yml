services:
  app:
    container_name: restart_lambda-app
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install uv -q &&
             uv sync --frozen -q &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload"
    environment:
      DATABASE_PATH: /data/registry.db
      WP_BASE_URL: http://local_wordpress-nginx
    volumes:
      - .:/app
      - lambda_data:/data
    networks:
      - internal
      - wp

  nginx:
    container_name: restart_lambda-nginx
    image: nginx:1.27-alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal
      - wp

volumes:
  lambda_data:

networks:
  internal:
    driver: bridge
  wp:
    external: true
    name: local_wordpress_internal